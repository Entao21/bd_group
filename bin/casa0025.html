# Monitoring Glacier Retreat and Industrial Exposure in Greenland

## A Google Earth Engine App for Cryosphere–Industry Interaction

### Data Dishwasher 

### CASA0025: Building Spatial Applications with Big Data

# Greenland Context

.pull-left-wide[
**Why Greenland?**

- Greenland is a strong case for integrated cryosphere monitoring because glacier retreat, terrain change, and industrial development can be studied together.
- The project connects glacier boundaries, mining activity, ports, shipping, elevation, and settlements in one Earth Engine workflow.
- This responds directly to the need for a platform-based approach rather than separate static layers.
]

# Limitations

## What the platform can and cannot do

---

# Main Limitations

.pull-left[
### Technical

- Temporal mismatch across GLIMS, Landsat, Sentinel-2, ArcticDEM, VIIRS, and MODIS
- Resolution mismatch between coarse thermal data and fine terrain data
- Some external elevation-change products are not directly available in GEE
]

.pull-right[
### Interpretation

- Proximity does not prove causality
- Dust and albedo effects are better treated as literature-supported mechanisms
- The platform is for screening, not definitive attribution
]

---

# Future Improvements

.pull-left[
### Data and workflow

- Add external elevation-change datasets
- Improve consistency of temporal comparison
- Add richer AIS or shipping-network analysis
]

.pull-right[
### Advanced analysis

- Extend toward stronger predictive modelling
- Add machine-learning classification after baseline validation
- Improve app outputs for planning and communication
]

## Project Summary {background-image="images/Greenland_title.png" background-size="cover" background-opacity="0.7"}

This project develops an interactive Google Earth Engine application to explore the nexus between glacier retreat, climate warming, and mining activity in Greenland's peripheral glacier zone. [web:13]

The platform combines remote sensing change detection, climate trend analysis, proximity-based anthropogenic indicators, and a Random Forest susceptibility model to identify areas where present-day glaciers may be more susceptible to future retreat. [web:20]

The workflow consists of two components: a preprocessing pipeline computing Landsat-derived glacier extent change (ca. 2000–2024), summer land surface temperature trends, terrain variables, and anthropogenic proximity indicators; then training a Random Forest model with spatial block validation. These outputs are exported as a multi-band Earth Engine asset for the interactive dual-map app. [web:19]

By integrating environmental change and mining-related pressures, the project supports Arctic climate adaptation and resource governance discussions. [cite:1]

### Problem Statement

Greenland's glaciers retreat rapidly under Arctic amplification, while mineral extraction grows in cryospheric environments. Interactions between climate drivers, topography, and mining accessibility lack accessible decision-support tools. [web:23]

This app provides visual analysis combining:

- Historical glacier retreat detection
- Warming trend analysis
- Terrain controls
- Proximity to mining, settlements, coastlines
- Predictive susceptibility modeling [web:24]

It identifies coinciding factors for vulnerability hotspot exploration, not causal attribution. [web:13]

### End User

Designed for Arctic policymakers, Greenland governance agencies, cryosphere researchers, mining impact analysts, and sustainability NGOs. [cite:1]

The split-panel interface, click statistics, and model diagnostics support scientific interpretation and policy communication intuitively. [web:16]

## Methodology {background-color="#1b3a4b" color="white"}

### Glacier Change Detection

Glacier extent mapped via Landsat summer NDSI: historical (~1999–2002) vs recent (~2022–2024). Retreat = ice lost from historical to recent. Filtered for noise (clouds, striping). [web:19]

Standardized to 300m polar grid (EPSG:3413). Distance rasters to mines, settlements, coast. [web:13]

### Climate &amp; Predictors

Landsat LST: baseline (~2000), recent temps, warming trend (`\(^\circ\)`C/yr) via per-pixel linear fit. [web:24]

Stack: elevation, slope, warming rate, mean temp, mine/settlement/coast proximity. [web:20]

### Random Forest Model

Trains on cleaned retreat/stable labels with **spatial block validation** (10 folds, 0-6 train, 7-9 test) to avoid autocorrelation. [web:13]

Classification for validation; regression for 0-1 susceptibility (masked to current glaciers). Metrics: accuracy, Kappa, F1. [web:20]

### Precomputed Asset

Exports multi-band asset: extents, retreat, warming, susceptibility, elevation, metadata. Enables fast app loading at Greenland scale. [cite:1]

## Limitations

**Technical:** Temporal/resolution mismatches (Landsat vs DEM); no direct elev-change in GEE. [web:23]

**Interpretation:** Proximity ≠ causality; screening tool, not attribution. Dust/albedo via literature. [cite:1]
